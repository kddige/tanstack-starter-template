services:
  redis:
    image: redis:latest
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
  db:
    image: postgres:18
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      # PostgreSQL 18+ stores PGDATA in a versioned subdirectory under
      # /var/lib/postgresql. Mount the parent directory, not the PGDATA path.
      - postgres_data:/var/lib/postgresql

volumes:
  redis_data:
  postgres_data:
